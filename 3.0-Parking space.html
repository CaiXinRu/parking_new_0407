<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://googleapis.com" rel="stylesheet" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>微程式資訊 Microprogram｜停車場繳費機</title>
  </head>

  <body>
    <div id="main-container">
      <header>
        <div id="header-inner">
          <div class="time"><span>2025-09-15</span><span>17:20</span></div>
          <div class="name">
            <span><img src="images/0407/mp_logo.png" alt="" /></span>
          </div>
          <div class="top-tool">
            <ul>
              <li>
                <a href=""
                  ><i><img src="images/contact-icon.svg" alt="" /></i>客服</a
                >
              </li>
              <li>
                <a href=""
                  ><i><img src="images/language-icon.svg" alt="" /></i>語系</a
                >
              </li>
            </ul>
          </div>
        </div>
        <div id="header-title">
          <div>永吉豐和苑三井花園飯店(台北忠孝)</div>
        </div>
        <div class="CUT">
          <div class="orb_graphic">
            <svg>
              <defs>
                <linearGradient id="myGradient" x1="0%" y1="0%" x2="0%" y2="100%" spreadMethod="pad">
                  <stop offset="0%" stop-color="#412187" stop-opacity="1" />
                  <stop offset="90%" stop-color="#412187" stop-opacity="1" />
                </linearGradient>
              </defs>
              <circle class="fill"></circle>
              <circle class="progress"></circle>
            </svg>
            <div class="orb_value count">60</div>
          </div>
        </div>
        <div class="header-pic"><img class="header-mask" src="images/header-bg.png" alt="" /></div>
      </header>
      <main class="nor parking-loc-page">
        <h2 class="parking-loc-page-title">車輛位置資訊</h2>
        <div id="payment-main" class="parking-loc-main">
          <div id="checkout-container" class="parking parking-loc">
            <section class="parking-loc-card parking-loc-card-photo" aria-labelledby="parking-loc-plate-label">
              <div class="parking-loc-photo">
                <img src="images/0407/display_AB7721.png" alt="車輛照片" />
              </div>
              <p id="parking-loc-plate-label" class="parking-loc-eyebrow">車牌</p>
              <div class="parking-loc-plate-box" lang="en">AB7721</div>
            </section>

            <section class="parking-loc-strip parking-loc-strip-floor" aria-label="停放樓層">
              <span class="parking-loc-strip-accent" aria-hidden="true"></span>
              <div class="parking-loc-strip-text">
                <p class="parking-loc-eyebrow">停放樓層</p>
                <p class="parking-loc-val-floor">地下一樓</p>
              </div>
              <div class="parking-loc-pill parking-loc-pill-floor">B1</div>
            </section>

            <section class="parking-loc-strip parking-loc-strip-space" aria-label="車格">
              <span class="parking-loc-strip-accent" aria-hidden="true"></span>
              <div class="parking-loc-strip-text">
                <p class="parking-loc-eyebrow">車格</p>
                <p class="parking-loc-val-space">075</p>
              </div>
              <div class="parking-loc-pill parking-loc-pill-space">

                  />
                </svg>
              </div>
            </section>

            <div class="parking-loc-notice">
              <span class="parking-loc-notice-ico" aria-hidden="true">i</span>
              <p class="parking-loc-notice-txt">
                票證歸戶完成，請於緩衝時間 <span class="parking-loc-em">15 分</span> 內取車出場。
              </p>
            </div>
          </div>
        </div>
        <div id="main-bt-container">
          <a href="" class="right">
            <svg xmlns="http://www.w3.org/2000/svg">
              <rect rx="38" ry="38" class="line" height="100%" width="100%" stroke-linejoin="round" /></svg
            >離開
          </a>
        </div>
      </main>
      <footer class="inner">
        <div id="pay-list-container">
          <div id="pat-list-inner">
            <p><img src="images/pay_easycard.png" alt="" /></p>
            <p><img src="images/pay_easypay.png" alt="" /></p>
            <p><img src="images/pay_ipass.png" alt="" /></p>
            <p><img src="images/pay_icash2.0.png" alt="" /></p>
            <p><img src="images/pay_linepay.png" alt="" /></p>
            <p><img src="images/pay_street.png" alt="" /></p>
            <p><img src="images/pay_twpay.png" alt="" /></p>
            <p><img src="images/pay_applepay.png" alt="" /></p>
            <p><img src="images/pay_googlepay.png" alt="" /></p>
            <p><img src="images/pay_samsungpay.png" alt="" /></p>
            <p><img src="images/pay_cash.png" alt="" /></p>
            <p><img src="images/pay_creditcard.png" alt="" /></p>
          </div>
        </div>
        <div class="footer-pic"><img class="footer-mask" src="images/footer-bg.png" alt="" /></div>
      </footer>
    </div>
  </body>
</html>
