<!doctype html>
<html>
<head>
<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link href="https://googleapis.com" rel="stylesheet">
	<link rel="stylesheet" href="css/reset.css">
	<link rel="stylesheet" href="css/style.css">
	<title>微程式資訊 Microprogram｜停車場繳費機</title>
</head>

<body>
	<div id="main-container">
		<header>
			<div id="header-inner">
				<div class="time"><span>2025-09-15</span><span>17:20</span></div>
				<div class="name"><span><img src="images/0407/MP_logo.png" alt=""/></span></div>
				<div class="top-tool">
					<ul>
						<li><a href=""><i><img src="images/contact-icon.svg" alt=""/></i>客服</a></li>
						<li><a href=""><i><img src="images/language-icon.svg" alt=""/></i>語系</a></li>
					</ul>
				</div>
			</div>			
			<div id="header-title">
				<div>永吉豐和苑三井花園飯店(台北忠孝)</div>
			</div>			
			<div class="CUT">
				<div class="orb_graphic">
					<svg>
						<defs>
							<linearGradient id="myGradient" x1="0%" y1="0%"	x2="0%" y2="100%" spreadMethod="pad">
								<stop offset="0%" stop-color="#412187" stop-opacity="1"/>
								<stop offset="90%" stop-color="#412187" stop-opacity="1"/>
							</linearGradient>
						</defs>
						<circle class="fill"></circle>
						<circle class="progress"></circle>
					</svg>
					<div class="orb_value count">60</div>
				</div>
			</div>
			<div class="header-pic"><img class="header-mask" src="images/header-bg.png" alt=""/></div>	
		</header>
		<main class="nor">			
			<h2>車輛位置資訊</h2>
			<div id="payment-main">
				<div id="checkout-container" class="parking">
					<div id="checkout-pic-container">
						<div class="type"><span><span>車號：</span>BFZ6330</span><span></div>
						<div class="pic"><img src="images/test/20220930003813_2_BFD8356.jpg" alt=""/></div>
					</div>
					<div id="checkout-list-container">
						<div class="checkout-inner">
							<ul>
								<li><span>停放位置</span><span>地下一樓</span></li>
								<li><span>車格數</span><span>075</span></li>
							</ul>
							<div class="timer">
								<p>票證歸戶完成</p>
								<p>請於緩衝時間 15 分內</p>
								<p>取車出場，歡迎再度光臨</p>
							</div>
						</div>
					</div>
				</div>				
			</div>					
			<div id="main-bt-container">
				<a href="" class="right">
					<svg xmlns="http://www.w3.org/2000/svg">
						<rect rx="38" ry="38" class="line" height="100%" width="100%" stroke-linejoin="round"/>
					</svg>關閉
				</a>
			</div>
		</main>
		<footer class="inner">		  
			<div id="pay-list-container">				
				<div id="pat-list-inner">
					<p><img src="images/pay_easycard.png" alt=""/></p>
					<p><img src="images/pay_easypay.png" alt=""/></p>
					<p><img src="images/pay_ipass.png" alt=""/></p>
					<p><img src="images/pay_icash2.0.png" alt=""/></p>
					<p><img src="images/pay_linepay.png" alt=""/></p>
					<p><img src="images/pay_street.png" alt=""/></p>
					<p><img src="images/pay_twpay.png" alt=""/></p>
					<p><img src="images/pay_applepay.png" alt=""/></p>
					<p><img src="images/pay_googlepay.png" alt=""/></p>
					<p><img src="images/pay_samsungpay.png" alt=""/></p>
					<p><img src="images/pay_cash.png" alt=""/></p>
					<p><img src="images/pay_creditcard.png" alt=""/></p>
				</div>
			</div>
			<div class="footer-pic"><img class="footer-mask" src="images/footer-bg.png" alt=""/></div>		  
		</footer>
	</div>
</body>
</html>
