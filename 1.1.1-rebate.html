<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://googleapis.com" rel="stylesheet" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      #payment-out #payment-bt-container.payment-method-grid {
        gap: 1.65rem;
      }
      #payment-out #payment-bt-container.payment-method-grid .pay-tile__art img {
        min-height: 140px;
        max-height: 140px;
      }
    </style>
    <title>微程式資訊 Microprogram｜停車場繳費機</title>
  </head>

  <body>
    <div id="main-container">
      <header>
        <div id="header-inner">
          <div class="time"><span>2025-09-15</span><span>17:20</span></div>
          <div class="name">
            <span><img src="images/0407/inan_logo.png" alt="" /></span>
          </div>
          <div class="top-tool">
            <ul>
              <li>
                <a href=""
                  ><i><img src="images/contact-icon.svg" alt="" /></i>客服</a
                >
              </li>
              <li>
                <a href=""
                  ><i><img src="images/language-icon.svg" alt="" /></i>語系</a
                >
              </li>
            </ul>
          </div>
        </div>
        <div id="header-title">
          <div>微程式資訊總部 台中停車場</div>
        </div>
        <div class="header-pic"><img class="header-mask" src="images/header-bg.png" alt="" /></div>
      </header>
      <main class="nor">
        <h2>請選擇折扣方式</h2>
        <div id="payment-out">
          <div id="payment-bt-container" class="payment-method-grid rebate">
            <a href="1.1.1.0-rebate-popup.html" class="pay-tile pay-tile--scan">
              <div class="pay-tile__header">折扣券折抵</div>
              <div class="pay-tile__inner">
                <div class="pay-tile__left">
                  <div class="pay-tile__instruction">
                    <span class="pay-tile__badge">掃碼</span>
                    <p class="pay-tile__hint">掃描紙本或手機折扣券</p>
                  </div>
                </div>
                <div class="pay-tile__right">
                  <div class="pay-tile__art">
                    <img src="images/0327/coupons_qrcode.png" alt="" />
                  </div>
                </div>
              </div>
            </a>
            <a href="" class="pay-tile pay-tile--place">
              <div class="pay-tile__header">聯名卡折抵</div>
              <div class="pay-tile__inner">
                <div class="pay-tile__left">
                  <div class="pay-tile__instruction">
                    <span class="pay-tile__badge">刷卡</span>
                    <p class="pay-tile__hint">使用銀行信用卡</p>
                  </div>
                </div>
                <div class="pay-tile__right">
                  <div class="pay-tile__art">
                    <img src="images/0327/coupons_credit.png" alt="" />
                  </div>
                </div>
              </div>
            </a>
          </div>
        </div>
        <div id="main-bt-container">
          <a href="1.1_temppay.html" class="left">
            <svg xmlns="http://www.w3.org/2000/svg">
              <rect rx="38" ry="38" class="line" height="100%" width="100%" stroke-linejoin="round" /></svg
            ><i></i>取消
          </a>
        </div>
      </main>
      <footer class="inner">
        <div id="pay-list-container">
          <div id="pat-list-inner">
            <p><img src="images/pay_easycard.png" alt="" /></p>
            <p><img src="images/pay_easypay.png" alt="" /></p>
            <p><img src="images/pay_ipass.png" alt="" /></p>
            <p><img src="images/pay_icash2.0.png" alt="" /></p>
            <p><img src="images/pay_linepay.png" alt="" /></p>
            <p><img src="images/pay_street.png" alt="" /></p>
            <p><img src="images/pay_twpay.png" alt="" /></p>
            <p><img src="images/pay_applepay.png" alt="" /></p>
            <p><img src="images/pay_googlepay.png" alt="" /></p>
            <p><img src="images/pay_samsungpay.png" alt="" /></p>
            <p><img src="images/pay_cash.png" alt="" /></p>
            <p><img src="images/pay_creditcard.png" alt="" /></p>
          </div>
        </div>
        <div class="footer-pic"><img class="footer-mask" src="images/footer-bg.png" alt="" /></div>
      </footer>
    </div>
  </body>
</html>
