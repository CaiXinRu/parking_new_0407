<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://googleapis.com" rel="stylesheet" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>微程式資訊 Microprogram｜停車場繳費機</title>
  </head>

  <body>
    <div id="main-container" class="page-temppay-checkout">
      <header>
        <div id="header-inner">
          <div class="time"><span>2025-09-15</span><span>17:20</span></div>
          <div class="name">
            <span><img src="images/0407/inan_logo.png" alt="" /></span>
          </div>
          <div class="top-tool">
            <ul>
              <li>
                <a href=""
                  ><i><img src="images/contact-icon.svg" alt="" /></i>客服</a
                >
              </li>
              <li>
                <a href=""
                  ><i><img src="images/language-icon.svg" alt="" /></i>語系</a
                >
              </li>
            </ul>
          </div>
        </div>
        <div id="header-title">
          <div>南山新市園區 C棟停車場</div>
        </div>
        <div class="header-pic"><img class="header-mask" src="images/header-bg.png" alt="" /></div>
      </header>
      <main class="nor temppay-checkout-page">
        <div id="payment-main">
          <div id="checkout-container">
            <div id="checkout-pic-container" class="checkout-top-card">
              <div class="checkout-top-card__row">
                <div class="checkout-hero">
                  <div class="pic" style="position: absolute; top: 9px;" aria-hidden="true"></div>
                </div>
                <div class="checkout-top-card__mid">
                  <div class="plate-badge" aria-label="車號">
                    <span class="plate-value">BFZ6330</span>
                  </div>
                  <div class="checkout-meta__times" aria-label="進出場時間">
                    <div class="time-item time-item--in">
                      <span class="time-item__icon" aria-hidden="true">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
                      </span>
                      <span class="time-item__line"><span class="time-label">進場時間</span> <span class="time-value">2023.10.27 14:30</span></span>
                    </div>
                    <div class="time-item time-item--out">
                      <span class="time-item__icon" aria-hidden="true">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                      </span>
                      <span class="time-item__line"><span class="time-label">出場時間</span> <span class="time-value">2023.10.27 16:15</span></span>
                    </div>
                  </div>
                </div>
                <div class="checkout-top-card__aside" aria-label="倒數與停車位">
                  <div class="CUT checkout-orb-wrap">
                    <div class="orb_graphic">
                      <svg>
                        <defs>
                          <linearGradient id="myGradient" x1="0%" y1="0%" x2="0%" y2="100%" spreadMethod="pad">
                            <stop offset="0%" stop-color="#412187" stop-opacity="1" />
                            <stop offset="90%" stop-color="#412187" stop-opacity="1" />
                          </linearGradient>
                        </defs>
                        <circle class="fill"></circle>
                        <circle class="progress"></circle>
                      </svg>
                      <div class="orb_value count">60</div>
                    </div>
                  </div>
                  <div class="checkout-slot-pill">
                    <span class="slot-chip" aria-hidden="true">P</span>
                    <span class="slot-pill__text"><span class="slot-label">停車位</span> <span class="slot-value">B2 - 05</span></span>
                  </div>
                </div>
              </div>
            </div>
            <div id="checkout-list-container" class="checkout-bill-card">
              <div class="checkout-inner">
                <h3 class="bill-list-title">
                  <svg class="bill-list-title__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                  明細清單
                </h3>
                <ul class="bill-line-items" aria-label="費用明細">
                  <li>
                    <span class="bill-desc">停車費</span>
                    <span class="bill-amt bill-amt--body">NT$ <strong>100</strong></span>
                  </li>
                  <li>
                    <span class="bill-desc">充電費（45 分鐘）</span>
                    <span class="bill-amt bill-amt--body">NT$ <strong>50</strong></span>
                  </li>
                  <li>
                    <span class="bill-desc">佔位費（15 分鐘）</span>
                    <span class="bill-amt bill-amt--body">NT$ <strong>30</strong></span>
                  </li>
                  <li class="bill-line-items__discount">
                    <span class="bill-desc">優惠折扣</span>
                    <span class="bill-amt bill-amt--discount">NT$ <strong>-20</strong></span>
                  </li>
                  <li class="bill-line-items__due">
                    <span class="bill-desc">應繳金額</span>
                    <span class="bill-amt bill-amt--due">NT$ <strong>160</strong></span>
                  </li>
                </ul>
              </div>
              <!-- <div class="bill-total-row" aria-label="應付總金額">
                <span class="total-label">總金額</span>
                <span class="total-value">NT$ 160</span>
              </div>
            </div> -->
          </div>
          <h2 class="temppay-pay-heading">請選擇支付方式</h2>
          <div id="checkout-paysel">
            <div id="checkout-pay-inner">
              <ul class="scroll">
                <li>
                  <a href="1.2_temppay-popup.html" class="cash"
                    >現金
                    <span>
                      <svg xmlns="http://www.w3.org/2000/svg">
                        <rect rx="23" ry="23" class="line" height="106%" width="104%" stroke-linejoin="round" /></svg
                      ><i></i>
                    </span>
                  </a>
                </li>
                <li>
                  <a href="1.1.0-otherpay.html" class="other"
                    >其他支付方式
                    <span>
                      <svg xmlns="http://www.w3.org/2000/svg">
                        <rect rx="23" ry="23" class="line" height="106%" width="104%" stroke-linejoin="round" /></svg
                      ><i></i>
                    </span>
                  </a>
                </li>
                <li>
                  <a href="1.1.1-rebate.html" class="rebate"
                    >停車折抵
                    <span>
                      <svg xmlns="http://www.w3.org/2000/svg">
                        <rect rx="23" ry="23" class="line" height="106%" width="104%" stroke-linejoin="round" /></svg
                      ><i></i>
                    </span>
                  </a>
                </li>
              </ul>
            </div>
          </div>
        </div>
        <div id="main-bt-container" style="bottom: -75px;">
          <a href="index.html" class="left">
            <svg xmlns="http://www.w3.org/2000/svg">
              <rect rx="38" ry="38" class="line" height="100%" width="100%" stroke-linejoin="round" /></svg
            ><i></i>回首頁
          </a>
          <a href="2.0_receiptcheck.html" class="right">
            <svg xmlns="http://www.w3.org/2000/svg">
              <rect rx="38" ry="38" class="line" height="100%" width="100%" stroke-linejoin="round" /></svg
            ><i></i>重新選擇
          </a>
        </div>
      </main>
      <footer class="inner">
        <div id="pay-list-container">
          <div id="pat-list-inner">
            <p><img src="images/pay_easycard.png" alt="" /></p>
            <p><img src="images/pay_easypay.png" alt="" /></p>
            <p><img src="images/pay_ipass.png" alt="" /></p>
            <p><img src="images/pay_icash2.0.png" alt="" /></p>
            <p><img src="images/pay_linepay.png" alt="" /></p>
            <p><img src="images/pay_street.png" alt="" /></p>
            <p><img src="images/pay_twpay.png" alt="" /></p>
            <p><img src="images/pay_applepay.png" alt="" /></p>
            <p><img src="images/pay_googlepay.png" alt="" /></p>
            <p><img src="images/pay_samsungpay.png" alt="" /></p>
            <p><img src="images/pay_cash.png" alt="" /></p>
            <p><img src="images/pay_creditcard.png" alt="" /></p>
          </div>
        </div>
        <div class="footer-pic"><img class="footer-mask" src="images/footer-bg.png" alt="" /></div>
      </footer>
    </div>
  </body>
</html>
