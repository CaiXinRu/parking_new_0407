<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://googleapis.com" rel="stylesheet" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>微程式資訊 Microprogram｜停車場繳費機</title>
  </head>

  <body>
    <div id="main-container" class="page-temppay-checkout">
      <header>
        <div id="header-inner">
          <div class="time"><span>2025-09-15</span><span>17:20</span></div>
          <div class="name">
            <span><img src="images/0407/MP_logo.png" alt="" /></span>
          </div>
          <div class="top-tool">
            <ul>
              <li>
                <a href=""
                  ><i><img src="images/contact-icon.svg" alt="" /></i>客服</a
                >
              </li>
              <li>
                <a href=""
                  ><i><img src="images/language-icon.svg" alt="" /></i>語系</a
                >
              </li>
            </ul>
          </div>
        </div>
        <div id="header-title" style="bottom: -15px">
          <div>永吉豐和苑三井花園飯店(台北忠孝)</div>
        </div>
        <div class="header-pic"><img class="header-mask" src="images/header-bg.png" alt="" /></div>
      </header>
      <main class="nor temppay-checkout-page">
        <div id="payment-main">
          <div id="checkout-container">
            <div id="checkout-pic-container" class="checkout-top-card">
              <div class="checkout-top-card__row">
                <div class="checkout-hero">
                  <div class="pic" aria-hidden="true"></div>
                  <div class="checkout-photo-loc" aria-label="停車位置">
                    <span class="checkout-photo-loc__icon" aria-hidden="true">
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                        width="16"
                        height="16"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <path d="M12 21s7-4.5 7-11a7 7 0 1 0-14 0c0 6.5 7 11 7 11z" />
                        <circle cx="12" cy="10" r="2.5" />
                      </svg>
                    </span>
                    <span class="checkout-photo-loc__text">位置：B2-105</span>
                  </div>
                </div>
                <div class="checkout-top-card__mid">
                  <div class="checkout-top-card__headrow">
                    <div class="plate-badge" aria-label="車號">
                      <span class="plate-value">AB7721</span>
                    </div>
                    <div class="checkout-orb-wrap CUT" aria-label="繳費倒數">
                      <div class="orb_graphic">
                        <svg>
                          <defs>
                            <linearGradient id="myGradient" x1="0%" y1="0%" x2="0%" y2="100%" spreadMethod="pad">
                              <stop offset="0%" stop-color="#412187" stop-opacity="1" />
                              <stop offset="90%" stop-color="#412187" stop-opacity="1" />
                            </linearGradient>
                          </defs>
                          <circle class="fill"></circle>
                          <circle class="progress"></circle>
                        </svg>
                        <div class="orb_value count">60</div>
                      </div>
                    </div>
                  </div>
                  <div class="checkout-meta__times" aria-label="進出場時間">
                    <div class="time-item time-item--in">
                      <div class="time-item__left">
                        <span class="time-pill">進　場</span>
                        <span class="time-date">2025-03-31</span>
                      </div>
                      <span class="time-time">10:30:45</span>
                    </div>
                    <div class="time-item time-item--out">
                      <div class="time-item__left">
                        <span class="time-pill">出　場</span>
                        <span class="time-date">2025-03-31</span>
                      </div>
                      <span class="time-time">18:55:28</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div id="checkout-list-container" class="checkout-bill-card">
              <div class="checkout-inner">
                <h3 class="bill-list-title">
                  <svg
                    class="bill-list-title__icon"
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    width="22"
                    height="22"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    aria-hidden="true"
                  >
                    <line x1="8" y1="6" x2="21" y2="6" />
                    <line x1="8" y1="12" x2="21" y2="12" />
                    <line x1="8" y1="18" x2="21" y2="18" />
                    <line x1="3" y1="6" x2="3.01" y2="6" />
                    <line x1="3" y1="12" x2="3.01" y2="12" />
                    <line x1="3" y1="18" x2="3.01" y2="18" />
                  </svg>
                  明細清單
                </h3>
                <ul class="bill-line-items" aria-label="費用明細">
                  <li>
                    <span class="bill-line__icon bill-line__icon--list" aria-hidden="true">
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                        width="22"
                        height="22"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <rect x="4" y="4" width="16" height="14" rx="2" />
                        <path d="M8 18v2M16 18v2M8 10h8" />
                      </svg>
                    </span>
                    <span class="bill-desc">停車費用</span>
                    <span class="bill-amt bill-amt--body">NT$ <strong>100</strong></span>
                  </li>
                  <li>
                    <span class="bill-line__icon bill-line__icon--list" aria-hidden="true">
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                        width="22"
                        height="22"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <path d="M13 2L3 14h8l-1 8 10-12h-8l1-8z" />
                      </svg>
                    </span>
                    <span class="bill-desc">充電費用</span>
                    <span class="bill-amt bill-amt--body">NT$ <strong>0</strong></span>
                  </li>
                  <li>
                    <span class="bill-line__icon bill-line__icon--list" aria-hidden="true">
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                        width="22"
                        height="22"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <path d="M5 17h14v-5H5zM5 12L7 5h10l2 7" />
                        <circle cx="7.5" cy="17.5" r="1.5" />
                        <circle cx="16.5" cy="17.5" r="1.5" />
                      </svg>
                    </span>
                    <span class="bill-desc">佔位費用</span>
                    <span class="bill-amt bill-amt--body">NT$ <strong>10</strong></span>
                  </li>
                  <li class="bill-line-items__discount">
                    <span class="bill-line__icon bill-line__icon--discount" aria-hidden="true">
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                        width="22"
                        height="22"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z" />
                        <path d="M7 7h.01" />
                      </svg>
                    </span>
                    <span class="bill-desc">優惠折扣</span>
                    <span class="bill-amt bill-amt--discount">NT$ <strong>100</strong></span>
                  </li>
                </ul>
              </div>
              <div class="bill-total-bar" aria-label="應繳金額">
                <span class="bill-total-bar__label">應繳金額</span>
                <span class="bill-total-bar__amt">NT$ <strong>180</strong></span>
              </div>
            </div>
          </div>
          <h2 class="temppay-pay-heading">請選擇支付方式</h2>
          <div id="checkout-paysel">
            <div id="checkout-pay-inner">
              <ul class="scroll checkout-pay-grid">
                <li>
                  <a href="1.2_temppay-popup.html" class="cash checkout-pay-tile" aria-label="現金付款">
                    <div class="checkout-pay-tile__head">現金</div>
                    <div class="checkout-pay-tile__body"><i aria-hidden="true"></i></div>
                  </a>
                </li>
                <li>
                  <a href="1.1.1-rebate.html" class="rebate checkout-pay-tile" aria-label="停車折抵">
                    <div class="checkout-pay-tile__head">停車折抵</div>
                    <div class="checkout-pay-tile__body"><i aria-hidden="true"></i></div>
                  </a>
                </li>
                <li>
                  <a href="1.1.0-otherpay.html" class="other checkout-pay-tile" aria-label="其他支付方式">
                    <div class="checkout-pay-tile__head">其他支付方式</div>
                    <div class="checkout-pay-tile__body"><i aria-hidden="true"></i></div>
                  </a>
                </li>
              </ul>
            </div>
          </div>
        </div>
        <div id="main-bt-container">
          <a href="index.html" class="left">
            <svg xmlns="http://www.w3.org/2000/svg">
              <rect rx="38" ry="38" class="line" height="100%" width="100%" stroke-linejoin="round" /></svg
            ><i></i>回首頁
          </a>
          <a href="2.0_receiptcheck.html" class="right">
            <svg xmlns="http://www.w3.org/2000/svg">
              <rect rx="38" ry="38" class="line" height="100%" width="100%" stroke-linejoin="round" /></svg
            ><i></i>重新選擇
          </a>
        </div>
      </main>
      <footer class="inner">
        <div id="pay-list-container">
          <div id="pat-list-inner">
            <p><img src="images/pay_easycard.png" alt="" /></p>
            <p><img src="images/pay_easypay.png" alt="" /></p>
            <p><img src="images/pay_ipass.png" alt="" /></p>
            <p><img src="images/pay_icash2.0.png" alt="" /></p>
            <p><img src="images/pay_linepay.png" alt="" /></p>
            <p><img src="images/pay_street.png" alt="" /></p>
            <p><img src="images/pay_twpay.png" alt="" /></p>
            <p><img src="images/pay_applepay.png" alt="" /></p>
            <p><img src="images/pay_googlepay.png" alt="" /></p>
            <p><img src="images/pay_samsungpay.png" alt="" /></p>
            <p><img src="images/pay_cash.png" alt="" /></p>
            <p><img src="images/pay_creditcard.png" alt="" /></p>
          </div>
        </div>
        <div class="footer-pic"><img class="footer-mask" src="images/footer-bg.png" alt="" /></div>
      </footer>
    </div>
  </body>
</html>
