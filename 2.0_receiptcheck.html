<!doctype html>
<html>
<head>
<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link href="https://googleapis.com" rel="stylesheet">
	<link rel="stylesheet" href="css/reset.css">
	<link rel="stylesheet" href="css/style.css">
	<style>
	#payment-out #payment-bt-container.payment-method-grid{display:grid;grid-template-columns:1fr;gap:1.35rem;width:100%;max-width:640px;height:auto;min-height:0;overflow:visible;align-content:start;padding:0 0 1.5rem;margin:0 auto 1rem}
	#payment-out #payment-bt-container.payment-method-grid .pay-tile{display:flex;flex-direction:column;text-decoration:none;color:inherit;border-radius:1.35rem;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.3),0 2px 8px rgba(0,0,0,.3);background:#f7f6f3;-webkit-tap-highlight-color:transparent}
	#payment-out #payment-bt-container.payment-method-grid .pay-tile:active{opacity:.92;transform:scale(.995)}
	#payment-out #payment-bt-container.payment-method-grid .pay-tile__header{font-size:1.9rem;font-weight:700;color:#fff;text-align:left;padding:.8rem 1.25rem;line-height:1}
	#payment-out #payment-bt-container.payment-method-grid .pay-tile--place .pay-tile__header{background:#54318c}
	#payment-out #payment-bt-container.payment-method-grid .pay-tile--nfc .pay-tile__header{background:#54318c}
	#payment-out #payment-bt-container.payment-method-grid .pay-tile--scan .pay-tile__header{background:#54318c}
	#payment-out #payment-bt-container.payment-method-grid .pay-tile__inner{display:flex;flex-direction:row;align-items:stretch;height: 85px;min-height:100px;background:#efd9ce}
	#payment-out #payment-bt-container.payment-method-grid .pay-tile__left{flex:1 1 72%;display:flex;flex-direction:column;justify-content:center;align-self:stretch;align-items:flex-start;width:100%;min-width:0;min-height:100%;padding:1.15rem 1rem 1.15rem 1.1rem;gap:.85rem}
	#payment-out #payment-bt-container.payment-method-grid .pay-tile__instruction{display:flex;flex-direction:row;flex-wrap:nowrap;align-items:center;justify-content:flex-start;gap:.55rem .85rem;width:100%;flex:0 0 auto;text-align:left;min-width:0}
	#payment-out #payment-bt-container.payment-method-grid .pay-tile__badge{display:inline-flex;align-items:center;padding:.45rem 1.25rem;border-radius:999px;font-size:1.65rem;font-weight:700;color:#fff;flex-shrink:0;line-height:1.25}
	#payment-out #payment-bt-container.payment-method-grid .pay-tile--place .pay-tile__badge{background:#907ad6}
	#payment-out #payment-bt-container.payment-method-grid .pay-tile--nfc .pay-tile__badge{background:#907ad6}
	#payment-out #payment-bt-container.payment-method-grid .pay-tile--scan .pay-tile__badge{background:#907ad6}
	#payment-out #payment-bt-container.payment-method-grid .pay-tile__hint{margin:0;font-size:2rem;font-weight:600;line-height:1.45;flex:1 1 0;min-width:0;text-align:left}
	#payment-out #payment-bt-container.payment-method-grid .pay-tile--place .pay-tile__hint{color:#000000}
	#payment-out #payment-bt-container.payment-method-grid .pay-tile--nfc .pay-tile__hint{color:#000000}
	#payment-out #payment-bt-container.payment-method-grid .pay-tile--scan .pay-tile__hint{color:#000000}
	#payment-out #payment-bt-container.payment-method-grid .pay-tile__right{flex:0 0 28%;display:flex;align-items:center;justify-content:center;padding:.5rem .75rem .5rem .25rem;min-width:0}
	#payment-out #payment-bt-container.payment-method-grid .pay-tile__art{display:flex;align-items:center;justify-content:center;width:100%;height:100%;min-height:200px}
	#payment-out #payment-bt-container.payment-method-grid .pay-tile__art img{max-height:260px;width:auto;max-width:100%;object-fit:contain}
	@media (max-width:520px){
	#payment-out #payment-bt-container.payment-method-grid .pay-tile__inner{background: #ffdd55;flex-direction:column}
	#payment-out #payment-bt-container.payment-method-grid .pay-tile__right{flex:0 0 auto;padding:.25rem .75rem .85rem;min-height:170px}
	#payment-out #payment-bt-container.payment-method-grid .pay-tile__art{min-height:180px}
	#payment-out #payment-bt-container.payment-method-grid .pay-tile__art img{max-height:240px}
	}
	</style>
	<title>微程式資訊 Microprogram｜停車場繳費機</title>
</head>

<body>
	<div id="main-container">
		<header>
			<div id="header-inner">
				<div class="time"><span>2025-09-15</span><span>17:20</span></div>
				<div class="name"><span><img src="images/c-logo.png" alt=""/></span></div>
				<div class="top-tool">
					<ul>
						<li><a href=""><i><img src="images/contact-icon.svg" alt=""/></i>客服</a></li>
						<li><a href=""><i><img src="images/language-icon.svg" alt=""/></i>語系</a></li>
					</ul>
				</div>
			</div>			
			<div id="header-title">
				<div>南山新市園區C棟停車場</div>
			</div>			
			<div class="header-pic"><img class="header-mask" src="images/header-bg.png" alt=""/></div>	
		</header>
		<main class="nor">			
			<h2>請點選發票領取方式</h2>
			<div id="payment-out">
				<div id="payment-bt-container" class="payment-method-grid">
					<a href="" class="pay-tile pay-tile--place">
						<div class="pay-tile__header">紙本發票</div>
						<div class="pay-tile__inner">
							<div class="pay-tile__left">
								<div class="pay-tile__instruction">
									<span class="pay-tile__badge">列印</span>
									<p class="pay-tile__hint">直接印出收據</p>
								</div>
							</div>
							<div class="pay-tile__right">
								<div class="pay-tile__art">
									<img src="images/0327/invoice_paper.png" alt="" />
								</div>
							</div>
						</div>
					</a>
					<a href="" class="pay-tile pay-tile--nfc">
						<div class="pay-tile__header">統一編號</div>
						<div class="pay-tile__inner">
							<div class="pay-tile__left">
								<div class="pay-tile__instruction">
									<span class="pay-tile__badge">統編</span>
									<p class="pay-tile__hint">公司報帳用</p>
								</div>
							</div>
							<div class="pay-tile__right">
								<div class="pay-tile__art">
									<img src="images/0327/invoice_ein.png" alt="" />
								</div>
							</div>
						</div>
					</a>
					<a href="" class="pay-tile pay-tile--scan">
						<div class="pay-tile__header">手機載具</div>
						<div class="pay-tile__inner">
							<div class="pay-tile__left">
								<div class="pay-tile__instruction">
									<span class="pay-tile__badge">掃碼</span>
									<p class="pay-tile__hint">掃描或輸入手機載具</p>
								</div>
							</div>
							<div class="pay-tile__right">
								<div class="pay-tile__art">
									<img src="images/0327/invoice_carried.png" alt="" />
								</div>
							</div>
						</div>
					</a>
					<a href="" class="pay-tile pay-tile--place">
						<div class="pay-tile__header">愛心捐</div>
						<div class="pay-tile__inner">
							<div class="pay-tile__left">
								<div class="pay-tile__instruction">
									<span class="pay-tile__badge">捐贈</span>
									<p class="pay-tile__hint">幫助社福團體</p>
								</div>
							</div>
							<div class="pay-tile__right">
								<div class="pay-tile__art">
									<img src="images/0327/invoice_donate.png" alt="" />
								</div>
							</div>
						</div>
					</a>
					<a href="" class="pay-tile pay-tile--nfc">
						<div class="pay-tile__header">票證載具</div>
						<div class="pay-tile__inner">
							<div class="pay-tile__left">
								<div class="pay-tile__instruction">
									<span class="pay-tile__badge">感應</span>
									<p class="pay-tile__hint">悠遊卡 / 一卡通</p>
								</div>
							</div>
							<div class="pay-tile__right">
								<div class="pay-tile__art">
									<img src="images/0327/invoice_card.png" alt="" />
								</div>
							</div>
						</div>
					</a>
				</div>
			</div>		
		</main>
		<footer class="inner">		  
			<div id="pay-list-container">				
				<div id="pat-list-inner">
					<p><img src="images/pay_easycard.png" alt=""/></p>
					<p><img src="images/pay_easypay.png" alt=""/></p>
					<p><img src="images/pay_ipass.png" alt=""/></p>
					<p><img src="images/pay_icash2.0.png" alt=""/></p>
					<p><img src="images/pay_linepay.png" alt=""/></p>
					<p><img src="images/pay_street.png" alt=""/></p>
					<p><img src="images/pay_twpay.png" alt=""/></p>
					<p><img src="images/pay_applepay.png" alt=""/></p>
					<p><img src="images/pay_googlepay.png" alt=""/></p>
					<p><img src="images/pay_samsungpay.png" alt=""/></p>
					<p><img src="images/pay_cash.png" alt=""/></p>
					<p><img src="images/pay_creditcard.png" alt=""/></p>
				</div>
			</div>
			<div class="footer-pic"><img class="footer-mask" src="images/footer-bg.png" alt=""/></div>		  
		</footer>
	</div>
</body>
</html>
