<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://googleapis.com" rel="stylesheet" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>微程式資訊 Microprogram｜停車場繳費機</title>
  </head>

  <body>
    <div id="popup_bg">
      <div id="popupParagraph" class="popup-inner popup-h1-bar temppay-cash-popup">

        <h1>系統訊息</h1>
        <p>將 QR code 對準掃描區</p>
        <div class="temppay-kiosk-wrap">
          <img src="/images/0331/kiosk_qrcode.png" alt="" class="temppay-kiosk-img" />
        </div>
        <div id="popup-inner" class="temppay-cash-layout">
          <div class="temppay-summary">
            <div class="temppay-summary__hint">
              <span>ⓘ 請於時間內完成掃描</span>
            </div>
            <div class="temppay-summary__row temppay-summary__row--due">
              <span class="temppay-summary__label">應繳金額</span>
              <span class="temppay-summary__amt temppay-summary__amt--pink">NT$ <strong>300</strong></span>
            </div>
            <!-- <div cl
					  -->
            <!-- <div class="temppay-summary__row temppay-summary__row--change">
						<div class="temppay-summary__col">
							<span class="temppay-summary__label">需要找零</span>
							<span class="temppay-summary__amt temppay-summary__amt--gold">NT$ <strong>0</strong></span>
						</div>
						<div class="temppay-summary__col">
							<span class="temppay-summary__label">實際找回</span>
							<span class="temppay-summary__amt temppay-summary__amt--gold">NT$ <strong>0</strong></span>
						</div>

          </div>
        </div>
        <div class="popup-buttom-bt">
          <ul>
            <li><a href="1.1.0-otherpay.html">取消</a></li>
          </ul>
        </div>
      </div>
    </div>
    <div id="main-container">
      <header>
        <div id="header-inner">
          <div class="time"><span>2025-09-15</span><span>17:20</span></div>
          <div class="name">
            <span><img src="images/0407/ASUS_logo.png" alt="" /></span>
          </div>
          <div class="top-tool">
            <ul>
              <li>
                <a href=""
                  ><i><img src="images/contact-icon.svg" alt="" /></i>客服</a
                >
              </li>
              <li>
                <a href=""
                  ><i><img src="images/language-icon.svg" alt="" /></i>語系</a
                >
              </li>
            </ul>
          </div>
        </div>
        <div id="header-title">
          <div>宏泰世界大樓</div>
        </div>
        <div class="CUT">
          <div class="orb_graphic">
            <svg>
              <defs>
                <linearGradient id="myGradient" x1="0%" y1="0%" x2="0%" y2="100%" spreadMethod="pad">
                  <stop offset="0%" stop-color="#412187" stop-opacity="1" />
                  <stop offset="90%" stop-color="#412187" stop-opacity="1" />
                </linearGradient>
              </defs>
              <circle class="fill"></circle>
              <circle class="progress"></circle>
            </svg>
            <div class="orb_value count">60</div>
          </div>
        </div>
        <div class="header-pic"><img class="header-mask" src="images/header-bg.png" alt="" /></div>
      </header>
      <main class="nor">
        <h2>請點選支付方式</h2>
        <div id="payment-main">
          <div id="checkout-container">
            <div id="checkout-pic-container">
              <div class="type">
                <span><span>車號：</span>BFZ6330</span><span><span>位置：</span>293</span>
              </div>
              <div class="pic"></div>
            </div>
            <div id="checkout-list-container">
              <div class="checkout-inner">
                <ul>
                  <li><span>總金額 NT$</span><span>300</span></li>
                  <li><span>優惠折抵 NT$</span><span>0</span></li>
                </ul>
                <div class="timer">
                  <p>
                    <span>進場時間：</span><span>2022-09-13<b></b>00:00:00</span>
                  </p>
                  <p>
                    <span>出場時間：</span><span>2022-09-13<b></b>00:00:00</span>
                  </p>
                </div>
                <div class="detail-ch">
                  <p><span>停車費用$200</span><span>充電費用$100</span><span>佔位費用$1,000</span></p>
                  <span class="min"><span>充電 120分鐘</span><span>佔位 100分鐘</span></span>
                </div>
              </div>
            </div>
          </div>
          <div id="checkout-paysel">
            <div id="checkout-pay-inner">
              <ul class="scroll">
                <li>
                  <a href="" class="cash"
                    >現金
                    <span>
                      <svg xmlns="http://www.w3.org/2000/svg">
                        <rect rx="23" ry="23" class="line" height="106%" width="104%" stroke-linejoin="round" /></svg
                      ><i></i>
                    </span>
                  </a>
                </li>
                <li>
                  <a href="" class="rebate"
                    >停車折抵
                    <span>
                      <svg xmlns="http://www.w3.org/2000/svg">
                        <rect rx="23" ry="23" class="line" height="106%" width="104%" stroke-linejoin="round" /></svg
                      ><i></i>
                    </span>
                  </a>
                </li>
                <li>
                  <a href="" class="other"
                    >其他支付方式
                    <span>
                      <svg xmlns="http://www.w3.org/2000/svg">
                        <rect rx="23" ry="23" class="line" height="106%" width="104%" stroke-linejoin="round" /></svg
                      ><i></i>
                    </span>
                  </a>
                </li>
              </ul>
            </div>
          </div>
        </div>
        <div id="main-bt-container">
          <a href="" class="left">
            <svg xmlns="http://www.w3.org/2000/svg">
              <rect rx="38" ry="38" class="line" height="100%" width="100%" stroke-linejoin="round" /></svg
            ><i></i>回首頁
          </a>
          <a href="" class="right">
            <svg xmlns="http://www.w3.org/2000/svg">
              <rect rx="38" ry="38" class="line" height="100%" width="100%" stroke-linejoin="round" /></svg
            ><i></i>重新選擇
          </a>
        </div>
      </main>
      <footer class="inner">
        <div id="pay-list-container">
          <div id="pat-list-inner">
            <p><img src="images/pay_easycard.png" alt="" /></p>
            <p><img src="images/pay_easypay.png" alt="" /></p>
            <p><img src="images/pay_ipass.png" alt="" /></p>
            <p><img src="images/pay_icash2.0.png" alt="" /></p>
            <p><img src="images/pay_linepay.png" alt="" /></p>
            <p><img src="images/pay_street.png" alt="" /></p>
            <p><img src="images/pay_twpay.png" alt="" /></p>
            <p><img src="images/pay_applepay.png" alt="" /></p>
            <p><img src="images/pay_googlepay.png" alt="" /></p>
            <p><img src="images/pay_samsungpay.png" alt="" /></p>
            <p><img src="images/pay_cash.png" alt="" /></p>
            <p><img src="images/pay_creditcard.png" alt="" /></p>
          </div>
        </div>
        <div class="footer-pic"><img class="footer-mask" src="images/footer-bg.png" alt="" /></div>
      </footer>
    </div>
  </body>
</html>
