<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://googleapis.com" rel="stylesheet" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>微程式資訊 Microprogram｜停車場繳費機</title>
  </head>

  <body>
    <div id="popup_bg">
      <div id="popupParagraph" class="popup-inner message-popup">
        <div class="message-popup__icon" aria-hidden="true">
          <img src="images/popup/icon_yes.png" alt="" width="120" height="120" />
        </div>
        <div class="message-popup__content">
          <p class="message-popup__title message-popup__title--xl">發票列印完成</p>
          <p class="message-popup__line1">請取統一發票，並於<strong class="message-popup__num">15</strong>分鐘內</p>
          <p class="message-popup__line2">取車出場，歡迎再度光臨</p>
          <p><img src="images/kiosk-pic-4.png" alt="" /></p>
        </div>
        <div class="popup-buttom-bt">
          <ul>
            <li><a href="2.0_receiptcheck.html">確定 (5s)</a></li>
          </ul>
        </div>
      </div>
    </div>
    <div id="main-container">
      <header>
        <div id="header-inner">
          <div class="time"><span>2025-09-15</span><span>17:20</span></div>
          <div class="name">
            <span><img src="images/0407/mp_logo.png" alt="" /></span>
          </div>
          <div class="top-tool">
            <ul>
              <li>
                <a href=""
                  ><i><img src="images/contact-icon.svg" alt="" /></i>客服</a
                >
              </li>
              <li>
                <a href=""
                  ><i><img src="images/language-icon.svg" alt="" /></i>語系</a
                >
              </li>
            </ul>
          </div>
        </div>
        <div id="header-title">
          <div>永吉豐和苑三井花園飯店(台北忠孝)</div>
        </div>
        <div class="header-pic"><img class="header-mask" src="images/header-bg.png" alt="" /></div>
      </header>
      <main class="nor">
        <h2>請點選發票領取方式</h2>
        <div id="payment-out" class="payment-out--tight">
          <div id="payment-bt-container" class="payment-method-grid">
            <a href="2.1_receiptcheck-popup.html" class="pay-tile pay-tile--place">
              <div class="pay-tile__header">紙本發票</div>
              <div class="pay-tile__inner">
                <div class="pay-tile__left">
                  <div class="pay-tile__instruction">
                    <span class="pay-tile__badge">列印</span>
                    <p class="pay-tile__hint">直接印出收據</p>
                  </div>
                </div>
                <div class="pay-tile__right">
                  <div class="pay-tile__art">
                    <img src="images/popup/invoice_paper.png" alt="" />
                  </div>
                </div>
              </div>
            </a>
            <a href="2.2-receipttax.html" class="pay-tile pay-tile--nfc">
              <div class="pay-tile__header">統一編號</div>
              <div class="pay-tile__inner">
                <div class="pay-tile__left">
                  <div class="pay-tile__instruction">
                    <span class="pay-tile__badge">統編</span>
                    <p class="pay-tile__hint">公司報帳用</p>
                  </div>
                </div>
                <div class="pay-tile__right">
                  <div class="pay-tile__art">
                    <img src="images/popup/invoice_ein.png" alt="" />
                  </div>
                </div>
              </div>
            </a>
            <a href="2.4-receiptphone.html" class="pay-tile pay-tile--scan">
              <div class="pay-tile__header">手機載具</div>
              <div class="pay-tile__inner">
                <div class="pay-tile__left">
                  <div class="pay-tile__instruction">
                    <span class="pay-tile__badge">掃碼</span>
                    <p class="pay-tile__hint">掃描或輸入手機載具</p>
                  </div>
                </div>
                <div class="pay-tile__right">
                  <div class="pay-tile__art">
                    <img src="images/popup/qrcode_carried.png" alt="" />
                  </div>
                </div>
              </div>
            </a>
            <a href="" class="pay-tile pay-tile--nfc">
              <div class="pay-tile__header">票證載具</div>
              <div class="pay-tile__inner">
                <div class="pay-tile__left">
                  <div class="pay-tile__instruction">
                    <span class="pay-tile__badge">感應</span>
                    <p class="pay-tile__hint">悠遊卡 / 一卡通</p>
                  </div>
                </div>
                <div class="pay-tile__right">
                  <div class="pay-tile__art">
                    <img src="images/popup/payment_cardSense.png" alt="" />
                  </div>
                </div>
              </div>
            </a>
            <a href="2.3-receiptdonate.html" class="pay-tile pay-tile--place">
              <div class="pay-tile__header">愛心捐</div>
              <div class="pay-tile__inner">
                <div class="pay-tile__left">
                  <div class="pay-tile__instruction">
                    <span class="pay-tile__badge">捐贈</span>
                    <p class="pay-tile__hint">幫助社福團體</p>
                  </div>
                </div>
                <div class="pay-tile__right">
                  <div class="pay-tile__art">
                    <img src="images/popup/invoice_donate.png" alt="" />
                  </div>
                </div>
              </div>
            </a>
          </div>
        </div>
      </main>
      <footer class="inner">
        <div id="pay-list-container">
          <div id="pat-list-inner">
            <p><img src="images/pay_easycard.png" alt="" /></p>
            <p><img src="images/pay_easypay.png" alt="" /></p>
            <p><img src="images/pay_ipass.png" alt="" /></p>
            <p><img src="images/pay_icash2.0.png" alt="" /></p>
            <p><img src="images/pay_linepay.png" alt="" /></p>
            <p><img src="images/pay_street.png" alt="" /></p>
            <p><img src="images/pay_twpay.png" alt="" /></p>
            <p><img src="images/pay_applepay.png" alt="" /></p>
            <p><img src="images/pay_googlepay.png" alt="" /></p>
            <p><img src="images/pay_samsungpay.png" alt="" /></p>
            <p><img src="images/pay_cash.png" alt="" /></p>
            <p><img src="images/pay_creditcard.png" alt="" /></p>
          </div>
        </div>
        <div class="footer-pic"><img class="footer-mask" src="images/footer-bg.png" alt="" /></div>
      </footer>
    </div>
  </body>
</html>
