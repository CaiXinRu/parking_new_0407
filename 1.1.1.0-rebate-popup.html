<!doctype html>
<html>
<head>
<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link href="https://googleapis.com" rel="stylesheet">
	<link rel="stylesheet" href="css/reset.css">
	<link rel="stylesheet" href="css/style.css">
	<title>微程式資訊 Microprogram｜停車場繳費機</title>
</head>

<body>
	<div id="popup_bg">
		<div id="popupParagraph" class="popup-inner">
			<div class="CUT">
				<div class="orb_graphic">
					<svg>
						<defs>
							<linearGradient id="myGradient" x1="0%" y1="0%"	x2="0%" y2="100%" spreadMethod="pad">
								<stop offset="0%" stop-color="#412187" stop-opacity="1"/>
								<stop offset="90%" stop-color="#412187" stop-opacity="1"/>
							</linearGradient>
						</defs>
						<circle class="fill"></circle>
						<circle class="progress"></circle>
					</svg>
					<div class="orb_value count">60</div>
				</div>
			</div>
			<h1>請將發票、卡片或折扣卷<br>放在下方感應區</h1>
			<div id="popup-inner">
				<div class="popup-pic">
					<p><img src="images/kiosk-pic-1.png" alt=""/></p>
				</div>
				<div class="popup-type">
					<ul>
						<li class="fee-ca">
							<p><span>總金額 NT$</span><span>300</span></p>
							<p><span>優惠折扣 NT$</span><span>25</span></p>
						</li>
						<li class="fee-am">
							<p><span>應繳金額 NT$</span><span>275</span></p>
						</li>
					</ul>
				</div>
			</div>
			<div class="popup-buttom-bt">
				<ul>
					<li><a href="">確定</a></li>
				</ul>				
			</div>
		</div>
	</div>
	<div id="main-container">
		<header>
			<div id="header-inner">
				<div class="time"><span>2025-09-15</span><span>17:20</span></div>
				<div class="name"><span><img src="images/c-logo.png" alt=""/></span></div>
				<div class="top-tool">
					<ul>
						<li><a href=""><i><img src="images/contact-icon.svg" alt=""/></i>客服</a></li>
						<li><a href=""><i><img src="images/language-icon.svg" alt=""/></i>語系</a></li>
					</ul>
				</div>
			</div>			
			<div id="header-title">
				<div>南山新市園區C棟停車場</div>
			</div>			
			<div class="header-pic"><img class="header-mask" src="images/header-bg.png" alt=""/></div>	
		</header>
		<main class="nor">			
			<h2>請選擇折扣方式</h2>
			<div id="payment-out">
				<div id="payment-bt-container" class="rebate">
					<ul class="scroll">
						<li>
							<a href="" class="paper">
								<span>
									<svg xmlns="http://www.w3.org/2000/svg">
										<rect rx="23" ry="23" class="line" height="104%" width="104%" stroke-linejoin="round"/>
									</svg><i></i>
								</span>發票補登
							</a>
							<div class="payment-list-container">
								<p>掃描紙本發票</p>
							</div>
						</li>
						<li>
							<a href="" class="recard">
								<span>
									<svg xmlns="http://www.w3.org/2000/svg">
										<rect rx="23" ry="23" class="line" height="104%" width="104%" stroke-linejoin="round"/>
									</svg><i></i>
								</span>聯名卡折抵
							</a>
							<div class="payment-list-container">
								<p>使用銀行信用卡</p>
							</div>
						</li>
						<li>
							<a href="" class="member">
								<span>
									<svg xmlns="http://www.w3.org/2000/svg">
										<rect rx="23" ry="23" class="line" height="104%" width="104%" stroke-linejoin="round"/>
									</svg><i></i>
								</span>會員卡折抵
							</a>						  
							<div class="payment-list-container">
								<p>APP / 會員卡片</p>
							</div>
						</li>
						<li>
							<a href="" class="coupon">
								<span>
									<svg xmlns="http://www.w3.org/2000/svg">
										<rect rx="23" ry="23" class="line" height="104%" width="104%" stroke-linejoin="round"/>
									</svg><i></i>
								</span>折扣券折抵
							</a>						  
							<div class="payment-list-container">
								<p>掃描紙本或手機折扣券</p>
							</div>
						</li>
					</ul>
				</div>
			</div>		
		</main>
		<footer class="inner">		  
			<div id="pay-list-container">				
				<div id="pat-list-inner">
					<p><img src="images/pay_easycard.png" alt=""/></p>
					<p><img src="images/pay_easypay.png" alt=""/></p>
					<p><img src="images/pay_ipass.png" alt=""/></p>
					<p><img src="images/pay_icash2.0.png" alt=""/></p>
					<p><img src="images/pay_linepay.png" alt=""/></p>
					<p><img src="images/pay_street.png" alt=""/></p>
					<p><img src="images/pay_twpay.png" alt=""/></p>
					<p><img src="images/pay_applepay.png" alt=""/></p>
					<p><img src="images/pay_googlepay.png" alt=""/></p>
					<p><img src="images/pay_samsungpay.png" alt=""/></p>
					<p><img src="images/pay_cash.png" alt=""/></p>
					<p><img src="images/pay_creditcard.png" alt=""/></p>
				</div>
			</div>
			<div class="footer-pic"><img class="footer-mask" src="images/footer-bg.png" alt=""/></div>		  
		</footer>
	</div>
</body>
</html>
