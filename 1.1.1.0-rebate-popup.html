<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://googleapis.com" rel="stylesheet" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>微程式資訊 Microprogram｜停車場繳費機</title>
  </head>

  <body>
    <div id="popup_bg">
      <div id="popupParagraph" class="popup-inner popup-h1-bar temppay-cash-popup">
        <h1>系統訊息</h1>
        <p>請將折扣條碼對準掃描器</p>
        <div class="temppay-kiosk-wrap">
          <img src="/images/popup/kiosk_qrcode.png" alt="" class="temppay-kiosk-img" />
        </div>
        <div id="popup-inner" class="temppay-cash-layout">
          <div class="temppay-summary">
            <div class="temppay-summary__hint">
              <span>ⓘ 完成後點擊「折抵完成」，繼續選擇繳費方式</span>
            </div>
            <div class="temppay-summary__divider"></div>
            <div class="temppay-summary__row temppay-summary__row--due">
              <span class="temppay-summary__label">停車費用</span>
              <span class="temppay-summary__amt temppay-summary__amt--gray">NT$ <strong>300</strong></span>
            </div>
            <div class="temppay-summary__divider"></div>
            <div class="temppay-summary__row temppay-summary__row--recv">
              <span class="temppay-summary__label">優惠折扣</span>
              <span class="temppay-summary__amt temppay-summary__amt--blue">NT$ <strong>-25</strong></span>
            </div>
            <div class="temppay-summary__divider"></div>
            <div class="temppay-summary__row temppay-summary__row--recv temppay-summary__row--payable">
              <span class="temppay-summary__label">應繳金額</span>
              <span class="temppay-summary__amt temppay-summary__amt--pink">NT$ <strong>275</strong></span>
            </div>
            <!-- <div class="temppay-summary__row temppay-summary__row--change">
						<div class="temppay-summary__col">
							<span class="temppay-summary__label">需要找零</span>
							<span class="temppay-summary__amt temppay-summary__amt--gold">NT$ <strong>0</strong></span>
						</div>
						<div class="temppay-summary__col">
							<span class="temppay-summary__label">實際找回</span>
							<span class="temppay-summary__amt temppay-summary__amt--gold">NT$ <strong>0</strong></span>
						</div>
					</div> -->
          </div>
        </div>
        <div class="popup-buttom-bt">
          <ul>
            <li><a href="1.1.1-rebate.html">折抵完成 (15s)</a></li>
          </ul>
        </div>
      </div>
    </div>
    <div id="main-container">
      <header>
        <div id="header-inner">
          <div class="time"><span>2025-09-15</span><span>17:20</span></div>
          <div class="name">
            <span><img src="images/0407/mp_logo.png" alt="" /></span>
          </div>
          <div class="top-tool">
            <ul>
              <li>
                <a href=""
                  ><i><img src="images/contact-icon.svg" alt="" /></i>客服</a
                >
              </li>
              <li>
                <a href=""
                  ><i><img src="images/language-icon.svg" alt="" /></i>語系</a
                >
              </li>
            </ul>
          </div>
        </div>
        <div id="header-title">
          <div>永吉豐和苑三井花園飯店(台北忠孝)</div>
        </div>
        <div class="header-pic"><img class="header-mask" src="images/header-bg.png" alt="" /></div>
      </header>
      <main class="nor">
        <h2>請選擇折扣方式</h2>
        <div id="payment-out">
          <div id="payment-bt-container" class="rebate">
            <ul class="scroll">
              <li>
                <a href="" class="paper">
                  <span>
                    <svg xmlns="http://www.w3.org/2000/svg">
                      <rect rx="23" ry="23" class="line" height="104%" width="104%" stroke-linejoin="round" /></svg
                    ><i></i> </span
                  >發票補登
                </a>
                <div class="payment-list-container">
                  <p>掃描紙本發票</p>
                </div>
              </li>
              <li>
                <a href="" class="recard">
                  <span>
                    <svg xmlns="http://www.w3.org/2000/svg">
                      <rect rx="23" ry="23" class="line" height="104%" width="104%" stroke-linejoin="round" /></svg
                    ><i></i> </span
                  >聯名卡折抵
                </a>
                <div class="payment-list-container">
                  <p>使用銀行信用卡</p>
                </div>
              </li>
              <li>
                <a href="" class="member">
                  <span>
                    <svg xmlns="http://www.w3.org/2000/svg">
                      <rect rx="23" ry="23" class="line" height="104%" width="104%" stroke-linejoin="round" /></svg
                    ><i></i> </span
                  >會員卡折抵
                </a>
                <div class="payment-list-container">
                  <p>APP / 會員卡片</p>
                </div>
              </li>
              <li>
                <a href="" class="coupon">
                  <span>
                    <svg xmlns="http://www.w3.org/2000/svg">
                      <rect rx="23" ry="23" class="line" height="104%" width="104%" stroke-linejoin="round" /></svg
                    ><i></i> </span
                  >折扣券折抵
                </a>
                <div class="payment-list-container">
                  <p>掃描紙本或手機折扣券</p>
                </div>
              </li>
            </ul>
          </div>
        </div>
      </main>
      <footer class="inner">
        <div id="pay-list-container">
          <div id="pat-list-inner">
            <p><img src="images/pay_easycard.png" alt="" /></p>
            <p><img src="images/pay_easypay.png" alt="" /></p>
            <p><img src="images/pay_ipass.png" alt="" /></p>
            <p><img src="images/pay_icash2.0.png" alt="" /></p>
            <p><img src="images/pay_linepay.png" alt="" /></p>
            <p><img src="images/pay_street.png" alt="" /></p>
            <p><img src="images/pay_twpay.png" alt="" /></p>
            <p><img src="images/pay_applepay.png" alt="" /></p>
            <p><img src="images/pay_googlepay.png" alt="" /></p>
            <p><img src="images/pay_samsungpay.png" alt="" /></p>
            <p><img src="images/pay_cash.png" alt="" /></p>
            <p><img src="images/pay_creditcard.png" alt="" /></p>
          </div>
        </div>
        <div class="footer-pic"><img class="footer-mask" src="images/footer-bg.png" alt="" /></div>
      </footer>
    </div>
  </body>
</html>
