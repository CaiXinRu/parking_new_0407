<!doctype html>
<html>
<head>
<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link href="https://googleapis.com" rel="stylesheet">
	<link rel="stylesheet" href="css/reset.css">
	<link rel="stylesheet" href="css/style.css">
	<title>微程式資訊 Microprogram｜停車場繳費機</title>
</head>

<body>
	<div id="popup_bg">
		<div id="popupParagraph" class="popup-inner single">
			<h1>請靠卡感應</h1>
			<p>請將電子票證靠近感應區</p>
			<div id="popup-inner">
				<div class="popup-pic">
					<p><img src="images/kiosk-pic-5.png" alt=""/></p>
				</div>
			</div>
			<div class="popup-buttom-bt">
				<ul>
					<li><a href="">確定</a></li>
				</ul>				
			</div>
		</div>
	</div>
	<div id="main-container">
		<header>
			<div id="header-inner">
				<div class="time"><span>2025-09-15</span><span>17:20</span></div>
				<div class="name"><span><img src="images/c-logo.png" alt=""/></span></div>
				<div class="top-tool">
					<ul>
						<li><a href=""><i><img src="images/contact-icon.svg" alt=""/></i>客服</a></li>
						<li><a href=""><i><img src="images/language-icon.svg" alt=""/></i>語系</a></li>
					</ul>
				</div>
			</div>			
			<div id="header-title">
				<div>南山新市園區C棟停車場</div>
			</div>			
			<div class="header-pic"><img class="header-mask" src="images/header-bg.png" alt=""/></div>	
		</header>
		<main class="nor">			
			<h2>請點選發票領取方式</h2>
			<div id="payment-out">
				<div id="payment-bt-container" class="rec">
					<ul class="scroll">
						<li>
							<a href="" class="paper">
								<span>
									<svg xmlns="http://www.w3.org/2000/svg">
										<rect rx="23" ry="23" class="line" height="104%" width="104%" stroke-linejoin="round"/>
									</svg><i></i>
								</span>紙本發票
							</a>
							<div class="payment-list-container">
								<p>直接印出收據</p>
							</div>
						</li>
						<li>
							<a href="" class="tax">
								<span>
									<svg xmlns="http://www.w3.org/2000/svg">
										<rect rx="23" ry="23" class="line" height="104%" width="104%" stroke-linejoin="round"/>
									</svg><i></i>
								</span>統一編號
							</a>
							<div class="payment-list-container">
								<p>公司報帳用</p>
							</div>
						</li>
						<li>
							<a href="" class="mobile">
								<span>
									<svg xmlns="http://www.w3.org/2000/svg">
										<rect rx="23" ry="23" class="line" height="104%" width="104%" stroke-linejoin="round"/>
									</svg><i></i>
								</span>手機載具
							</a>						  
							<div class="payment-list-container">
								<p>掃描或輸入手機載具</p>
							</div>
						</li>
						<li>
							<a href="" class="benefit">
								<span>
									<svg xmlns="http://www.w3.org/2000/svg">
										<rect rx="23" ry="23" class="line" height="104%" width="104%" stroke-linejoin="round"/>
									</svg><i></i>
								</span>愛心捐
							</a>						  
							<div class="payment-list-container">
								<p>幫助社福團體</p>
							</div>
						</li>
						<li>
							<a href="" class="card">
								<span>
									<svg xmlns="http://www.w3.org/2000/svg">
										<rect rx="23" ry="23" class="line" height="104%" width="104%" stroke-linejoin="round"/>
									</svg><i></i>
								</span>票證載具
							</a>						  
							<div class="payment-list-container">
								<p>悠遊卡 / 一卡通 </p>
							</div>
						</li>
					</ul>
				</div>
			</div>		
		</main>
		<footer class="inner">		  
			<div id="pay-list-container">				
				<div id="pat-list-inner">
					<p><img src="images/pay_easycard.png" alt=""/></p>
					<p><img src="images/pay_easypay.png" alt=""/></p>
					<p><img src="images/pay_ipass.png" alt=""/></p>
					<p><img src="images/pay_icash2.0.png" alt=""/></p>
					<p><img src="images/pay_linepay.png" alt=""/></p>
					<p><img src="images/pay_street.png" alt=""/></p>
					<p><img src="images/pay_twpay.png" alt=""/></p>
					<p><img src="images/pay_applepay.png" alt=""/></p>
					<p><img src="images/pay_googlepay.png" alt=""/></p>
					<p><img src="images/pay_samsungpay.png" alt=""/></p>
					<p><img src="images/pay_cash.png" alt=""/></p>
					<p><img src="images/pay_creditcard.png" alt=""/></p>
				</div>
			</div>
			<div class="footer-pic"><img class="footer-mask" src="images/footer-bg.png" alt=""/></div>		  
		</footer>
	</div>
</body>
</html>
