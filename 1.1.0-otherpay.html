<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://googleapis.com" rel="stylesheet" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>微程式資訊 Microprogram｜停車場繳費機</title>
  </head>

  <body>
    <div id="main-container">
      <header>
        <div id="header-inner">
          <div class="time"><span>2025-09-15</span><span>17:20</span></div>
          <div class="name">
            <span><img src="images/c-logo.png" alt="" /></span>
          </div>
          <div class="top-tool">
            <ul>
              <li>
                <a href=""
                  ><i><img src="images/contact-icon.svg" alt="" /></i>客服</a
                >
              </li>
              <li>
                <a href=""
                  ><i><img src="images/language-icon.svg" alt="" /></i>語系</a
                >
              </li>
            </ul>
          </div>
        </div>
        <div id="header-title">
          <div>南山新市園區C棟停車場</div>
        </div>
        <div class="header-pic"><img class="header-mask" src="images/header-bg.png" alt="" /></div>
      </header>
      <main class="nor">
        <h2>請點選支付方式</h2>
        <div id="payment-out">
          <div id="payment-bt-container" class="payment-method-grid">
            <a href="" class="pay-tile pay-tile--place">
              <div class="pay-tile__title">電子票證</div>
              <div class="pay-tile__graphic">
                <div class="pay-tile__art"><img src="images/0327/payment_cardSense.png" alt="" /></div>
                <p class="pay-tile__hint">請靠近於票證卡片感應區</p>
              </div>
              <div class="pay-tile__logos">
                <img src="images/payment-easycard.png" alt="" />
                <img src="images/payment-ipass.png" alt="" />
                <img src="images/payment-icash.png" alt="" />
              </div>
            </a>
            <a href="" class="pay-tile pay-tile--nfc">
              <div class="pay-tile__title">信用卡</div>
              <div class="pay-tile__graphic">
                <div class="pay-tile__art"><img src="images/0327/payment_creditCard.png" alt="" /></div>
                <p class="pay-tile__hint">請靠近或插入讀卡感應機</p>
              </div>
              <div class="pay-tile__logos">
                <img src="images/payment-visa.png" alt="" />
                <img src="images/payment-master.png" alt="" />
                <img src="images/payment-jcb.png" alt="" />
                <img src="images/payment-apple.png" alt="" />
                <img src="images/payment-google.png" alt="" />
                <img src="images/payment-sum.png" alt="" />
              </div>
            </a>
            <a href="" class="pay-tile pay-tile--scan">
              <div class="pay-tile__title">電子支付</div>
              <div class="pay-tile__graphic">
                <div class="pay-tile__art"><img src="images/0327/payment_qrCode.png" alt="" /></div>
                <p class="pay-tile__hint">請將支付條碼對準掃描器</p>
              </div>
              <div class="pay-tile__logos">
                <img src="images/payment-easw.png" alt="" />
                <img src="images/payment-line.png" alt="" />
                <img src="images/payment-street.png" alt="" />
                <img src="images/pay_twpay.png" alt="" />
              </div>
            </a>
          </div>
        </div>
      </main>
      <footer class="inner">
        <div id="pay-list-container">
          <div id="pat-list-inner">
            <p><img src="images/pay_easycard.png" alt="" /></p>
            <p><img src="images/pay_easypay.png" alt="" /></p>
            <p><img src="images/pay_ipass.png" alt="" /></p>
            <p><img src="images/pay_icash2.0.png" alt="" /></p>
            <p><img src="images/pay_linepay.png" alt="" /></p>
            <p><img src="images/pay_street.png" alt="" /></p>
            <p><img src="images/pay_twpay.png" alt="" /></p>
            <p><img src="images/pay_applepay.png" alt="" /></p>
            <p><img src="images/pay_googlepay.png" alt="" /></p>
            <p><img src="images/pay_samsungpay.png" alt="" /></p>
            <p><img src="images/pay_cash.png" alt="" /></p>
            <p><img src="images/pay_creditcard.png" alt="" /></p>
          </div>
        </div>
        <div class="footer-pic"><img class="footer-mask" src="images/footer-bg.png" alt="" /></div>
      </footer>
    </div>
  </body>
</html>
