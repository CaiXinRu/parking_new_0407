<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://googleapis.com" rel="stylesheet" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      #payment-out #payment-bt-container.payment-method-grid {
        gap: 1.65rem;
      }
      #payment-out #payment-bt-container.payment-method-grid .pay-tile__art img {
        min-height: 140px;
        max-height: 140px;
      }
    </style>
    <title>微程式資訊 Microprogram｜停車場繳費機</title>
  </head>

  <body>
    <div id="main-container">
      <header>
        <div id="header-inner">
          <div class="time"><span>2025-09-15</span><span>17:20</span></div>
          <div class="name">
            <span><img src="images/0407/mp_logo.png" alt="" /></span>
          </div>
          <div class="top-tool">
            <ul>
              <li>
                <a href=""
                  ><i><img src="images/contact-icon.svg" alt="" /></i>客服</a
                >
              </li>
              <li>
                <a href=""
                  ><i><img src="images/language-icon.svg" alt="" /></i>語系</a
                >
              </li>
            </ul>
          </div>
        </div>
        <div id="header-title">
          <div>永吉豐和苑三井花園飯店(台北忠孝)</div>
        </div>
        <div class="CUT">
          <div class="orb_graphic">
            <svg>
              <defs>
                <linearGradient id="myGradient" x1="0%" y1="0%" x2="0%" y2="100%" spreadMethod="pad">
                  <stop offset="0%" stop-color="#412187" stop-opacity="1" />
                  <stop offset="90%" stop-color="#412187" stop-opacity="1" />
                </linearGradient>
              </defs>
              <circle class="fill"></circle>
              <circle class="progress"></circle>
            </svg>
            <div class="orb_value count">60</div>
          </div>
        </div>
        Ｒ
        <div class="header-pic">
          <img class="header-mask" src="images/header-bg.png" alt="" />
        </div>
      </header>
      <main class="nor">
        <h2>請點選支付方式</h2>
        <div id="payment-out">
          <div id="payment-bt-container" class="payment-method-grid">
            <a href="1.4_temppay-popup.html" class="pay-tile pay-tile--place">
              <div class="pay-tile__header">電子票證</div>
              <div class="pay-tile__inner">
                <div class="pay-tile__left">
                  <div class="pay-tile__instruction">
                    <span class="pay-tile__badge">靠近</span>
                    <p class="pay-tile__hint">請將票卡靠近感應區</p>
                  </div>
                  <div class="pay-tile__logos">
                    <img src="images/payment-easycard.png" alt="" />
                    <img src="images/payment-ipass.png" alt="" />
                    <img src="images/payment-icash.png" alt="" />
                  </div>
                </div>
                <div class="pay-tile__right">
                  <div class="pay-tile__art">
                    <img src="images/popup/payment_cardSense.png" alt="" />
                  </div>
                </div>
              </div>
            </a>
            <a href="1.3_temppay-popup.html" class="pay-tile pay-tile--nfc">
              <div class="pay-tile__header">信用卡</div>
              <div class="pay-tile__inner">
                <div class="pay-tile__left">
                  <div class="pay-tile__instruction">
                    <span class="pay-tile__badge">感應</span>
                    <p class="pay-tile__hint">請插入或感應於信用卡機</p>
                  </div>
                  <div class="pay-tile__logos">
                    <img src="images/payment-visa.png" alt="" />
                    <img src="images/payment-master.png" alt="" />
                    <img src="images/payment-jcb.png" alt="" />
                    <img src="images/payment-apple.png" alt="" />
                    <img src="images/payment-google.png" alt="" />
                    <img src="images/payment-sum.png" alt="" />
                  </div>
                </div>
                <div class="pay-tile__right">
                  <div class="pay-tile__art">
                    <img src="images/popup/payment_creditCard.png" alt="" />
                  </div>
                </div>
              </div>
            </a>
            <a href="1.1.2-qrcode.html" class="pay-tile pay-tile--scan">
              <div class="pay-tile__header">行動支付</div>
              <div class="pay-tile__inner">
                <div class="pay-tile__left">
                  <div class="pay-tile__instruction">
                    <span class="pay-tile__badge">掃描</span>
                    <p class="pay-tile__hint">請將條碼對準掃描器</p>
                  </div>
                  <div class="pay-tile__logos">
                    <img src="images/payment-easw.png" alt="" />
                    <img src="images/payment-line.png" alt="" />
                    <img src="images/payment-street.png" alt="" />
                    <img src="images/pay_twpay.png" alt="" />
                  </div>
                </div>
                <div class="pay-tile__right">
                  <div class="pay-tile__art">
                    <img src="images/popup/qrcode_carried.png" alt="" />
                  </div>
                </div>
              </div>
            </a>
          </div>
        </div>
        <div id="main-bt-container">
          <a href="1.1_temppay.html" class="left">
            <svg xmlns="http://www.w3.org/2000/svg">
              <rect rx="38" ry="38" class="line" height="100%" width="100%" stroke-linejoin="round" /></svg
            ><i></i>取消
          </a>
        </div>
      </main>
      <footer class="inner">
        <div id="pay-list-container">
          <div id="pat-list-inner">
            <p><img src="images/pay_easycard.png" alt="" /></p>
            <p><img src="images/pay_easypay.png" alt="" /></p>
            <p><img src="images/pay_ipass.png" alt="" /></p>
            <p><img src="images/pay_icash2.0.png" alt="" /></p>
            <p><img src="images/pay_linepay.png" alt="" /></p>
            <p><img src="images/pay_street.png" alt="" /></p>
            <p><img src="images/pay_twpay.png" alt="" /></p>
            <p><img src="images/pay_applepay.png" alt="" /></p>
            <p><img src="images/pay_googlepay.png" alt="" /></p>
            <p><img src="images/pay_samsungpay.png" alt="" /></p>
            <p><img src="images/pay_cash.png" alt="" /></p>
            <p><img src="images/pay_creditcard.png" alt="" /></p>
          </div>
        </div>
        <div class="footer-pic"><img class="footer-mask" src="images/footer-bg.png" alt="" /></div>
      </footer>
    </div>
  </body>
</html>
