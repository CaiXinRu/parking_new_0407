<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://googleapis.com" rel="stylesheet" />
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link href="css/system.css" rel="stylesheet" type="text/css" />
    <title>微程式資訊 Microprogram｜停車場繳費機</title>
  </head>

  <body>
    <div id="main-container">
      <header>
        <div id="header-inner">
          <div class="time"><span>2025-09-15</span><span>17:20</span></div>
          <div class="name">
            <span><img src="../images/c-logo.png" alt="" /></span>
          </div>
          <div class="top-tool">
            <ul>
              <li>
                <a href=""
                  ><i><img src="../images/contact-icon.svg" alt="" /></i>客服</a
                >
              </li>
              <li>
                <a href=""
                  ><i><img src="../images/language-icon.svg" alt="" /></i>語系</a
                >
              </li>
            </ul>
          </div>
        </div>
        <div id="header-title">
          <div>南山新市園區C棟停車場</div>
        </div>
        <div class="CUT">
          <div class="orb_graphic">
            <svg>
              <defs>
                <linearGradient id="myGradient" x1="0%" y1="0%" x2="0%" y2="100%" spreadMethod="pad">
                  <stop offset="0%" stop-color="#412187" stop-opacity="1" />
                  <stop offset="90%" stop-color="#412187" stop-opacity="1" />
                </linearGradient>
              </defs>
              <circle class="fill"></circle>
              <circle class="progress"></circle>
            </svg>
            <div class="orb_value count">60</div>
          </div>
        </div>
        <div class="header-pic"><img class="header-mask" src="../images/header-bg.png" alt="" /></div>
      </header>
      <main class="nor">
        <h2>投幣器補幣-步驟1：補幣</h2>
        <div class="cash-badge-wrap">
          <span class="cash-badge">即時更新</span>
        </div>
        <div class="system-type">使用投幣器，按結帳現金存量進行補幣。全部完成後按「下一步」，進行現金結帳。</div>
        <div class="system-container cash-refill cash-acceptor">
          <div id="system-tb-inner" class="settle-grid">
            <article class="settle-card settle-card--blue">
              <header class="settle-card__head">
                <span class="settle-card__coin">50</span>
                <span class="settle-card__unit">幣別 (TWD)</span>
              </header>
              <div class="settle-card__stats">
                <div class="settle-stat">
                  <span class="settle-stat__label">目前數量</span>
                  <span class="settle-stat__value">0</span>
                </div>
                <div class="settle-stat">
                  <span class="settle-stat__label">應備數量</span>
                  <span class="settle-stat__value">0</span>
                </div>
              </div>
              <div class="settle-card__total">
                <span class="settle-card__total-label">本次補幣數量</span>
                <span class="settle-card__total-value">0</span>
              </div>
            </article>

            <article class="settle-card settle-card--green">
              <header class="settle-card__head">
                <span class="settle-card__coin">10</span>
                <span class="settle-card__unit">幣別 (TWD)</span>
              </header>
              <div class="settle-card__stats">
                <div class="settle-stat">
                  <span class="settle-stat__label">目前數量</span>
                  <span class="settle-stat__value">165</span>
                </div>
                <div class="settle-stat">
                  <span class="settle-stat__label">應備數量</span>
                  <span class="settle-stat__value">150</span>
                </div>
              </div>
              <div class="settle-card__total">
                <span class="settle-card__total-label">本次補幣數量</span>
                <span class="settle-card__total-value">65</span>
              </div>
            </article>

            <article class="settle-card settle-card--purple">
              <header class="settle-card__head">
                <span class="settle-card__coin">5</span>
                <span class="settle-card__unit">幣別 (TWD)</span>
              </header>
              <div class="settle-card__stats">
                <div class="settle-stat">
                  <span class="settle-stat__label">目前數量</span>
                  <span class="settle-stat__value">130</span>
                </div>
                <div class="settle-stat">
                  <span class="settle-stat__label">應備數量</span>
                  <span class="settle-stat__value">100</span>
                </div>
              </div>
              <div class="settle-card__total">
                <span class="settle-card__total-label">本次補幣數量</span>
                <span class="settle-card__total-value">30</span>
              </div>
            </article>
          </div>
        </div>
        <div id="main-bt-container">
          <a href="" class="right">
            <svg xmlns="http://www.w3.org/2000/svg">
              <rect rx="38" ry="38" class="line" height="100%" width="100%" stroke-linejoin="round" /></svg
            >下一步
          </a>
        </div>
      </main>
      <footer class="inner">
        <div id="pay-list-container">
          <div id="pat-list-inner">
            <p><img src="images/pay_easycard.png" alt="" /></p>
            <p><img src="images/pay_easypay.png" alt="" /></p>
            <p><img src="images/pay_ipass.png" alt="" /></p>
            <p><img src="images/pay_icash2.0.png" alt="" /></p>
            <p><img src="images/pay_linepay.png" alt="" /></p>
            <p><img src="images/pay_street.png" alt="" /></p>
            <p><img src="images/pay_twpay.png" alt="" /></p>
            <p><img src="images/pay_applepay.png" alt="" /></p>
            <p><img src="images/pay_googlepay.png" alt="" /></p>
            <p><img src="images/pay_samsungpay.png" alt="" /></p>
            <p><img src="images/pay_cash.png" alt="" /></p>
            <p><img src="images/pay_creditcard.png" alt="" /></p>
          </div>
        </div>
        <div class="footer-pic"><img class="footer-mask" src="../images/footer-bg.png" alt="" /></div>
      </footer>
    </div>
  </body>
</html>
