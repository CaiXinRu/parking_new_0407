	<div id="popup_bg">

			<h1>客服資訊</h1>
			<div class="service-info-popup__content">
				<div class="service-info-popup__cards">
					<div class="service-info-card">
						<div class="service-info-card__icon service-info-card__icon--map" aria-hidden="true">
							<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
								<path d="M8 18c0-6.6 5.4-12 12-12s12 5.4 12 12c0 9-12 22-12 22S8 27 8 18z"/>
								<circle cx="20" cy="18" r="3" fill="currentColor" stroke="none"/>
							</svg>
						</div>
						<div class="service-info-card__text">
							<span class="service-info-card__label">本站名稱</span>
							<span class="service-info-card__value">南山新市園區C棟停車場</span>
						</div>
					</div>
					<div class="service-info-card">
						<div class="service-info-card__icon service-info-card__icon--phone" aria-hidden="true">
							<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

							</svg>
						</div>
						<div class="service-info-card__text">
							<span class="service-info-card__label">聯絡客服</span>
							<span class="service-info-card__value service-info-card__value--phone">0800 - 123 - 456</span>
						</div>
					</div>
				</div>
			</div>
			<div class="popup-buttom-bt receipt-success-popup__actions">
				<ul>
					<li><a href="">關閉 (5s)</a></li>
				</ul>
			</div>
		</div>
